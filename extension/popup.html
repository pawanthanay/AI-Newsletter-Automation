<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily AI Brief</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <div class="logo">✦</div>
        <h1>AI Newsletter</h1>
        <p>Curated automated updates directly to your inbox.</p>
    </div>

    <!-- Main action button -->
    <div class="button-container">
        <button id="generateBtn" class="premium-button">
            <span class="btn-text">Get AI Updates</span>
            <span class="btn-glow"></span>
        </button>
    </div>

    <!-- Status Messages -->
    <div id="statusContainer" class="status-container hidden">
        <div class="loader hidden" id="spinner"></div>
        <p id="statusMessage" class="status-message"></p>
    </div>

    <script src="popup.js"></script>
</body>
</html>
